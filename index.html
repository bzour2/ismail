<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismail Bzour | متجر التصاميم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --paypal: #003087;
            --reflect: #2ecc71;
            --dark: #0f0c29;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

        body { background-color: #f4f7f6; color: var(--dark); overflow-x: hidden; }

        header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%);
            color: white; padding: 60px 20px; text-align: center;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }

        .container { max-width: 1000px; margin: auto; padding: 20px; }

        /* تنسيق الكروت */
        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: -40px;
        }

        .card {
            background: var(--white); border-radius: 15px; padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); }
        .card i { font-size: 45px; color: var(--primary); margin-bottom: 15px; }
        .price { font-size: 26px; color: #27ae60; font-weight: bold; margin: 15px 0; }

        .btn-order {
            background: var(--primary); color: white; padding: 12px 30px;
            border-radius: 30px; border: none; font-size: 16px; cursor: pointer;
            width: 100%; font-weight: bold;
        }

        /* نافذة اختيار الدفع (Modal) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center; position: relative;
        }

        .modal-content h3 { margin-bottom: 20px; }

        .payment-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border: 2px solid #eee; border-radius: 10px;
            margin-bottom: 15px; cursor: pointer; transition: 0.3s;
        }

        .payment-option:hover { border-color: var(--primary); background: #f9f9f9; }

        .payment-option i { font-size: 24px; }
        .paypal-opt i { color: var(--paypal); }
        .reflect-opt i { color: var(--reflect); }

        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }

        footer { text-align: center; padding: 30px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>Ismail Bzour</h1>
    <p>اختر خدمتك المفضلة وابدأ العمل معنا اليوم</p>
</header>

<div class="container">
    <div class="services-grid">
        <div class="card">
            <i class="fas fa-clapperboard"></i>
            <h3>مونتاج فيديو احترافي</h3>
            <p>مونتاج سينمائي للفيديوهات القصيرة والطويلة.</p>
            <div class="price">20$</div>
            <button class="btn-order" onclick="openPaymentModal('مونتاج فيديو احترافي', '20$')">اطلب الآن</button>
        </div>

        <div class="card">
            <i class="fas fa-bezier-curve"></i>
            <h3>تصميم لوجو (Logo)</h3>
            <p>شعار فريد يعبر عن هويتك أو شركتك.</p>
            <div class="price">15$</div>
            <button class="btn-order" onclick="openPaymentModal('تصميم لوجو', '15$')">اطلب الآن</button>
        </div>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3>اختر طريقة الدفع</h3>
        <p id="selectedServiceName" style="color: #666; margin-bottom: 20px; font-weight: bold;"></p>
        
        <div class="payment-option paypal-opt" onclick="sendToWhatsapp('PayPal')">
            <span>باي بال (PayPal)</span>
            <i class="fab fa-paypal"></i>
        </div>

        <div class="payment-option reflect-opt" onclick="sendToWhatsapp('Reflect')">
            <span>ريفلكت (Reflect)</span>
            <i class="fas fa-wallet"></i>
        </div>
    </div>
</div>

<footer>
    جميع الحقوق محفوظة © Ismail Bzour 2026
</footer>

<script>
    let currentService = "";
    let currentPrice = "";

    function openPaymentModal(serviceName, price) {
        currentService = serviceName;
        currentPrice = price;
        document.getElementById('selectedServiceName').innerText = serviceName + " - " + price;
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }

    function sendToWhatsapp(method) {
        const phone = "972569760078"; // رقم الواتساب الخاص بك
        let paymentDetails = "";
        
        if(method === 'PayPal') {
            paymentDetails = "عن طريق باي بال (alshaqi2015@gmail.com)";
        } else {
            paymentDetails = "عن طريق ريفلكت (0569760078)";
        }

        const message = `مرحباً إسماعيل، أريد طلب خدمة: ${currentService}%0A` +
                        `السعر: ${currentPrice}%0A` +
                        `طريقة الدفع المختارة: ${paymentDetails}`;
        
        window.location.href = `https://wa.me/${phone}?text=${message}`;
    }

    // إغلاق النافذة عند الضغط خارجها
    window.onclick = function(event) {
        if (event.target == document.getElementById('paymentModal')) {
            closeModal();
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismail Bzour | خدمات التصميم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root { --primary: #6c5ce7; --dark: #0f0c29; --white: #ffffff; --bg: #f8f9fd; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg); color: var(--dark); line-height: 1.6; }
        header { background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%); color: white; padding: 60px 20px; text-align: center; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-top: -40px; }
        .card { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card i { font-size: 50px; color: var(--primary); margin-bottom: 20px; }
        .btn-order { background: var(--primary); color: white; padding: 12px 25px; border-radius: 50px; border: none; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; position: relative; }
        .payment-opt { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 2px solid #eee; border-radius: 15px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        .admin-box { background: white; border-radius: 20px; padding: 30px; margin-top: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        #adminPanel { display: none; }
        footer { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

<div id="mainSite">
    <header>
        <h1 onclick="handleHeaderClick()" style="cursor: pointer;">Ismail Bzour</h1>
        <p>تصاميم إبداعية بمواصفات عالمية</p>
    </header>
    <div class="container">
        <div class="services-grid">
            <div class="card"><i class="fas fa-pen-nib"></i><h3>تصميم شعار</h3><button class="btn-order" onclick="openOrder('تصميم شعار')">اطلب الآن</button></div>
            <div class="card"><i class="fas fa-video"></i><h3>تصميم انترو فيديو</h3><button class="btn-order" onclick="openOrder('تصميم انترو فيديو')">اطلب الآن</button></div>
            <div class="card"><i class="fas fa-microscope"></i><h3>دراسة وتحليل شعار</h3><button class="btn-order" onclick="openOrder('دراسة وتحليل شعار')">اطلب الآن</button></div>
            <div class="card"><i class="fas fa-magic"></i><h3>تحويل سكيتش لشعار</h3><button class="btn-order" onclick="openOrder('تحويل سكيتش لشعار')">اطلب الآن</button></div>
        </div>
    </div>
</div>

<div id="adminPanel" class="container">
    <div class="admin-box">
        <h2>لوحة تحكم إسماعيل (تجريبية)</h2>
        <hr><br>
        <p><b>زوار اليوم:</b> 15 شخص</p>
        <p><b>الطلبات الأخيرة:</b> لا توجد طلبات جديدة</p>
        <button onclick="location.reload()" class="btn-order" style="background:#ff7675; width:auto;">تسجيل خروج</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>دخول الإدارة</h3>
        <input type="password" id="passInput" style="width:100%; padding:10px; margin:20px 0; text-align:center;" placeholder="أدخل الرمز">
        <button class="btn-order" onclick="checkAuth()">دخول</button>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3 id="servTitle"></h3><br>
        <div class="payment-opt" onclick="finish('باي بال')">باي بال <span>alshaqi2015@gmail.com</span></div>
        <div class="payment-opt" onclick="finish('ريفلكت')">ريفلكت <span>0569760078</span></div>
    </div>
</div>

<script>
    let clickCount = 0;
    let selectedServ = "";

    // الدخول للوحة التحكم عند الضغط 3 مرات على الاسم
    function handleHeaderClick() {
        clickCount++;
        if (clickCount === 3) {
            document.getElementById('loginModal').style.display = 'flex';
            clickCount = 0;
        }
    }

    function checkAuth() {
        const p = document.getElementById('passInput').value;
        // البصمة الصحيحة لـ 900800 باستخدام MD5
        const h = CryptoJS.MD5(p).toString();
        if (h === "7f7062400b86a8a071578f793b58498b") {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainSite').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("الرمز خطأ!");
        }
    }

    function openOrder(s) {
        selectedServ = s;
        document.getElementById('servTitle').innerText = s;
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function finish(m) {
        const msg = `مرحباً إسماعيل، أريد طلب: ${selectedServ} عبر ${m}`;
        window.location.href = `https://wa.me/972569760078?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
